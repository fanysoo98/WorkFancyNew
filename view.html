<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkFancy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#111113;color:#f5f4f0;min-height:100vh;}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;text-align:center;padding:2rem;}
.ring{width:48px;height:48px;border-radius:50%;border:2px solid #27272d;border-top-color:#f0c040;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.logo{font-family:system-ui,sans-serif;font-size:16px;font-weight:800;letter-spacing:-0.03em;color:#f5f4f0;margin-bottom:8px;}
.logo span{color:#f0c040;}
#error{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:12px;text-align:center;padding:2rem;}
#error h2{font-size:1.4rem;font-weight:700;letter-spacing:-0.02em;}
#error p{font-size:13.5px;color:#888680;line-height:1.7;}
#error a{color:#f0c040;text-decoration:none;font-size:13px;margin-top:8px;display:inline-block;}
#frame{width:100%;height:100vh;border:none;display:none;}
</style>
</head>
<body>

<div id="loading">
  <div class="logo">Work<span>Fancy</span></div>
  <div class="ring"></div>
  <p style="font-size:13px;color:#888680;">Loading your site…</p>
</div>

<div id="error">
  <div class="logo">Work<span>Fancy</span></div>
  <h2>Site not found</h2>
  <p>This link may have expired or doesn't exist.<br>Check the URL and try again.</p>
  <a href="https://fanysoo98.github.io/WorkFancyNew/">← Back to WorkFancy</a>
</div>

<iframe id="frame" title="Published site"></iframe>

<script>
const WORKER_URL = 'https://gentle-rain-32f0.soofany130.workers.dev';

async function load(){
  const id = new URLSearchParams(window.location.search).get('id');
  if(!id){ showError(); return; }

  try {
    const res = await fetch(`${WORKER_URL}/get?id=${id}`);
    if(!res.ok) throw new Error('Not found');
    const data = await res.json();
    if(!data || !data[0]) { showError(); return; }

    const { title, template, headers, rows, options } = data[0];
    document.title = (title||'My Data') + ' — WorkFancy';

    const html = buildHTML(title, template, headers, rows, options||{});
    const frame = document.getElementById('frame');
    frame.srcdoc = html;
    frame.style.display = 'block';
    document.getElementById('loading').style.display = 'none';
  } catch(e){
    showError();
  }
}

function buildHTML(title, tpl, headers, rows, opts){
  const colors = {
    professional:{ bg:'#f4f3ef', hd:'#1a1a2e', ac:'#1a1a2e', tx:'#111111' },
    cute:        { bg:'#fff0f6', hd:'#ff6b9d', ac:'#e91e8c', tx:'#3d1a2e' },
    educational: { bg:'#f0f7ff', hd:'#1565c0', ac:'#1565c0', tx:'#0a2744' },
    fun:         { bg:'#0d0d1a', hd:'#7c3aed', ac:'#a78bfa', tx:'#f0ede6' },
  }[tpl] || { bg:'#f4f3ef', hd:'#1a1a2e', ac:'#1a1a2e', tx:'#111111' };

  const bg = opts.bg || colors.bg;
  const hd = opts.hd || colors.hd;
  const ac = opts.ac || colors.ac;
  const tx = opts.tx || colors.tx;
  const ph = opts.ph || 'Search…';
  const ft = opts.ft || 'Made with WorkFancy';

  const S = {
    professional:{ hdr:`background:${hd};color:#f5f4f0;`, tb:'1px solid rgba(0,0,0,.08)', tr:'12px', tbg:'#fff', thbg:'#f2f0ea', thc:'#9a9590', rb:'rgba(0,0,0,.05)', hov:'#f9f8f5', hlb:'#fef08a', hlt:'#6b3d00', sb:'1px solid rgba(255,255,255,.18)', sbg:'rgba(255,255,255,.1)', sr:'8px' },
    cute:        { hdr:`background:${hd};color:#fff;border-radius:0 0 18px 18px;`, tb:'2px solid #ffc1d8', tr:'16px', tbg:'#fff', thbg:'#ffe4f0', thc:'#c0567a', rb:'#ffe4f0', hov:'#fff5f9', hlb:'#ffd6e7', hlt:'#8b1a4a', sb:'2px solid rgba(255,255,255,.4)', sbg:'rgba(255,255,255,.28)', sr:'999px' },
    educational: { hdr:`background:${hd};color:#fff;`, tb:'1px solid #90caf9', tr:'8px', tbg:'#fff', thbg:'#e3f2fd', thc:'#1565c0', rb:'#e3f2fd', hov:'#f0f7ff', hlb:'#ffd54f', hlt:'#4a2c00', sb:'1px solid rgba(255,255,255,.3)', sbg:'rgba(255,255,255,.15)', sr:'6px' },
    fun:         { hdr:`background:linear-gradient(90deg,${hd},#db2777);color:#fff;`, tb:'1px solid rgba(167,139,250,.18)', tr:'14px', tbg:'rgba(255,255,255,.02)', thbg:'rgba(124,58,237,.18)', thc:'#a78bfa', rb:'rgba(255,255,255,.04)', hov:'rgba(124,58,237,.08)', hlb:'rgba(167,139,250,.28)', hlt:'#e0d9ff', sb:'1px solid rgba(167,139,250,.35)', sbg:'rgba(255,255,255,.06)', sr:'10px' },
  }[tpl] || {};

  const x = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  const gf = tpl==='cute' ? '<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">' : tpl==='fun' ? '<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&display=swap" rel="stylesheet">' : '';
  const thead = (headers||[]).map(h=>`<th>${x(h)}</th>`).join('');
  const tbody = (rows||[]).map(r=>'<tr>'+(headers||[]).map((_,i)=>`<td title="${x(String(r[i]??''))}">${x(String(r[i]??''))}</td>`).join('')+'</tr>').join('');

  return `<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>${x(title||'My Data')}</title>${gf}
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:${bg};color:${tx};min-height:100vh;-webkit-font-smoothing:antialiased}
header{${S.hdr}padding:.875rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;position:sticky;top:0;z-index:10}
.t{font-size:16px;font-weight:700;letter-spacing:-.02em}
.sw{position:relative;flex:1;max-width:340px}
.sw svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);pointer-events:none}
#s{width:100%;padding:9px 14px 9px 36px;border:${S.sb};border-radius:${S.sr};font-size:13px;background:${S.sbg};color:${tx};outline:none;font-family:inherit;transition:border-color .15s}
#s:focus{border-color:${ac}}#s::placeholder{opacity:.45}
main{padding:1.5rem 2rem}
.m{font-size:11.5px;opacity:.4;margin-bottom:.75rem;font-family:monospace}
.table-box{border:${S.tb};border-radius:${S.tr};overflow:hidden;background:${S.tbg}}
.sc{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13.5px}
thead tr{background:${S.thbg}}
th{padding:10px 14px;text-align:left;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;color:${S.thc};border-bottom:1px solid ${S.rb};cursor:pointer;user-select:none;white-space:nowrap}
th:hover{opacity:.7}th.sorted{color:${ac}}
td{padding:10px 14px;border-bottom:1px solid ${S.rb};max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tbody tr:hover td{background:${S.hov}}
.hl{background:${S.hlb};color:${S.hlt};border-radius:3px;padding:0 2px}
#empty{text-align:center;padding:3rem;opacity:.3;font-size:14px;display:none}
footer{padding:1rem 2rem;font-size:11px;opacity:.3;text-align:center;font-family:monospace;border-top:1px solid rgba(128,128,128,.1);margin-top:2rem}
</style></head><body>
<header>
  <div class="t">${x(title||'My Data')}</div>
  <div class="sw">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${ac}" stroke-width="2.5" opacity=".7"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input id="s" type="text" placeholder="${x(ph)}">
  </div>
</header>
<main>
  <div class="m" id="meta">${(rows||[]).length} rows · ${(headers||[]).length} columns · workfancy</div>
  <div class="table-box"><div class="sc"><table id="tbl">
    <thead><tr>${thead}</tr></thead>
    <tbody>${tbody}</tbody>
  </table></div></div>
  <div id="empty">No results found</div>
</main>
<footer>${x(ft)}</footer>
<script>
(function(){
  function e(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
  const rows=[...document.querySelectorAll('#tbl tbody tr')];
  const meta=document.getElementById('meta'),empty=document.getElementById('empty'),base=meta.textContent;
  document.getElementById('s').addEventListener('input',function(){
    const q=this.value.toLowerCase().trim();let n=0;
    rows.forEach(tr=>{
      const show=!q||[...tr.cells].some(td=>td.textContent.toLowerCase().includes(q));
      tr.style.display=show?'':'none';
      if(show){n++;[...tr.cells].forEach(td=>{
        if(!q){td.textContent=td.getAttribute('data-o')||td.textContent;return;}
        const o=td.getAttribute('data-o')||(td.setAttribute('data-o',td.textContent),td.textContent);
        const i=o.toLowerCase().indexOf(q);
        td.innerHTML=i>=0?e(o.slice(0,i))+'<span class="hl">'+e(o.slice(i,i+q.length))+'</span>'+e(o.slice(i+q.length)):e(o);
      });}
    });
    meta.textContent=q?n+' of ${(rows||[]).length} shown':base;
    empty.style.display=(q&&n===0)?'block':'none';
  });
  let sc=-1,sa=true;
  document.querySelectorAll('th').forEach((th,i)=>{
    th.addEventListener('click',()=>{
      if(sc===i)sa=!sa;else{sc=i;sa=true;}
      document.querySelectorAll('th').forEach(t=>t.classList.remove('sorted'));th.classList.add('sorted');
      const vis=[...rows].filter(r=>r.style.display!=='none');
      vis.sort((a,b)=>{const va=a.cells[i]?.textContent||'',vb=b.cells[i]?.textContent||'';const na=parseFloat(va),nb=parseFloat(vb);if(!isNaN(na)&&!isNaN(nb))return sa?na-nb:nb-na;return sa?va.localeCompare(vb):vb.localeCompare(va);});
      const tb=document.querySelector('#tbl tbody');vis.forEach(r=>tb.appendChild(r));
    });
  });
})();
<\/script></body></html>`;
}

function showError(){
  document.getElementById('loading').style.display = 'none';
  document.getElementById('error').style.display = 'flex';
}

load();
</script>
</body>
</html>
