<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WorkFancy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#111113;color:#f5f4f0;min-height:100vh;}
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;text-align:center;padding:2rem;}
.ring{width:48px;height:48px;border-radius:50%;border:2px solid #27272d;border-top-color:#f0c040;animation:spin 1s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.logo{font-size:16px;font-weight:800;letter-spacing:-0.03em;color:#f5f4f0;margin-bottom:8px;}
.logo span{color:#f0c040;}
#error{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:12px;text-align:center;padding:2rem;}
#error h2{font-size:1.4rem;font-weight:700;}
#error p{font-size:13.5px;color:#888680;line-height:1.7;}
#error a{color:#f0c040;text-decoration:none;font-size:13px;margin-top:8px;display:inline-block;}
#app{display:none;}
</style>
</head>
<body>

<div id="loading">
  <div class="logo">Work<span>Fancy</span></div>
  <div class="ring"></div>
  <p style="font-size:13px;color:#888680;">Loading your site…</p>
</div>

<div id="error">
  <div class="logo">Work<span>Fancy</span></div>
  <h2>Site not found</h2>
  <p>This link may have expired or doesn't exist.<br>Check the URL and try again.</p>
  <a href="https://fanysoo98.github.io/WorkFancyNew/">← Back to WorkFancy</a>
</div>

<div id="app"></div>

<script>
const WORKER_URL = 'https://gentle-rain-32f0.soofany130.workers.dev';
let SITE_ID = null;
let HEADERS = [];
let TEMPLATE = 'professional';
let OPTIONS = {};
let allRows = [];
let sortCol = -1, sortAsc = true;
let filterValues = {};
let bulkMode = false;

async function load(){
  const id = new URLSearchParams(window.location.search).get('id');
  if(!id){ showError(); return; }
  SITE_ID = id;

  try {
    const res = await fetch(`${WORKER_URL}/get?id=${id}`);
    if(!res.ok) throw new Error('Not found');
    const data = await res.json();
    if(!data || !data[0]) { showError(); return; }

    const { title, template, headers, rows, options } = data[0];
    HEADERS = headers || [];
    TEMPLATE = template || 'professional';
    OPTIONS = options || {};
    document.title = (title||'My Data') + ' — WorkFancy';

    // load extra records from records table
    const recRes = await fetch(`${WORKER_URL}/records?site_id=${id}`);
    let extraRows = [];
    if(recRes.ok){
      const recs = await recRes.json();
      extraRows = recs.map(r => HEADERS.map(h => r.data[h]||''));
    }

    allRows = [...(rows||[]), ...extraRows];
    renderApp(title, template, headers, allRows, options||{});

  } catch(e){
    showError();
  }
}

function getStyles(tpl, bg, hd, ac, tx){
  return {
    professional:{ hdr:`background:${hd};color:#f5f4f0;`, tb:'1px solid rgba(0,0,0,.08)', tr:'12px', tbg:'#fff', thbg:'#f2f0ea', thc:'#9a9590', rb:'rgba(0,0,0,.05)', hov:'#f9f8f5', hlb:'#fef08a', hlt:'#6b3d00', sb:'1px solid rgba(255,255,255,.18)', sbg:'rgba(255,255,255,.1)', sr:'8px', btnbg:hd, btntx:'#f5f4f0' },
    cute:        { hdr:`background:${hd};color:#fff;border-radius:0 0 18px 18px;`, tb:'2px solid #ffc1d8', tr:'16px', tbg:'#fff', thbg:'#ffe4f0', thc:'#c0567a', rb:'#ffe4f0', hov:'#fff5f9', hlb:'#ffd6e7', hlt:'#8b1a4a', sb:'2px solid rgba(255,255,255,.4)', sbg:'rgba(255,255,255,.28)', sr:'999px', btnbg:hd, btntx:'#fff' },
    educational: { hdr:`background:${hd};color:#fff;`, tb:'1px solid #90caf9', tr:'8px', tbg:'#fff', thbg:'#e3f2fd', thc:'#1565c0', rb:'#e3f2fd', hov:'#f0f7ff', hlb:'#ffd54f', hlt:'#4a2c00', sb:'1px solid rgba(255,255,255,.3)', sbg:'rgba(255,255,255,.15)', sr:'6px', btnbg:hd, btntx:'#fff' },
    fun:         { hdr:`background:linear-gradient(90deg,${hd},#db2777);color:#fff;`, tb:'1px solid rgba(167,139,250,.18)', tr:'14px', tbg:'rgba(255,255,255,.02)', thbg:'rgba(124,58,237,.18)', thc:'#a78bfa', rb:'rgba(255,255,255,.04)', hov:'rgba(124,58,237,.08)', hlb:'rgba(167,139,250,.28)', hlt:'#e0d9ff', sb:'1px solid rgba(167,139,250,.35)', sbg:'rgba(255,255,255,.06)', sr:'10px', btnbg:hd, btntx:'#fff' },
  }[tpl] || {};
}

function renderApp(title, tpl, headers, rows, opts){
  const colors = {
    professional:{ bg:'#f4f3ef', hd:'#1a1a2e', ac:'#1a1a2e', tx:'#111111' },
    cute:        { bg:'#fff0f6', hd:'#ff6b9d', ac:'#e91e8c', tx:'#3d1a2e' },
    educational: { bg:'#f0f7ff', hd:'#1565c0', ac:'#1565c0', tx:'#0a2744' },
    fun:         { bg:'#0d0d1a', hd:'#7c3aed', ac:'#a78bfa', tx:'#f0ede6' },
  }[tpl] || { bg:'#f4f3ef', hd:'#1a1a2e', ac:'#1a1a2e', tx:'#111111' };

  const bg = opts.bg || colors.bg;
  const hd = opts.hd || colors.hd;
  const ac = opts.ac || colors.ac;
  const tx = opts.tx || colors.tx;
  const ph = opts.ph || 'Search…';
  const ft = opts.ft || 'Made with WorkFancy';
  const S = getStyles(tpl, bg, hd, ac, tx);

  document.getElementById('app').innerHTML = `
    <style>
      body{background:${bg};color:${tx}}
      header{${S.hdr}padding:.875rem 2rem;display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap;position:sticky;top:0;z-index:20}
      .site-title{font-size:16px;font-weight:700;letter-spacing:-.02em}
      .hdr-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
      .search-wrap{position:relative;}
      .search-wrap svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);pointer-events:none}
      #search{padding:9px 14px 9px 36px;border:${S.sb};border-radius:${S.sr};font-size:13px;background:${S.sbg};color:${tx};outline:none;font-family:inherit;width:220px;transition:border-color .15s}
      #search:focus{border-color:${ac}}
      #search::placeholder{opacity:.45}
      .add-btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;background:${S.btnbg};color:${S.btntx};border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s}
      .add-btn:hover{opacity:.85}
      main{padding:1.5rem 2rem}
      .meta{font-size:11.5px;opacity:.4;margin-bottom:.75rem;font-family:monospace}
      .filter-bar{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;}
      .filter-select{padding:6px 10px;border:${S.tb};border-radius:6px;background:${S.tbg};color:${tx};font-size:12px;font-family:inherit;outline:none;cursor:pointer;max-width:160px;}
      .table-box{border:${S.tb};border-radius:${S.tr};overflow:hidden;background:${S.tbg}}
      .sc{overflow-x:auto}
      table{width:100%;border-collapse:collapse;font-size:13.5px}
      thead tr{background:${S.thbg}}
      th{padding:10px 14px;text-align:left;font-size:10.5px;letter-spacing:.08em;text-transform:uppercase;font-weight:600;color:${S.thc};border-bottom:1px solid ${S.rb};cursor:pointer;user-select:none;white-space:nowrap}
      th:hover{opacity:.7}
      th.sorted{color:${ac}}
      .sort-icon{margin-left:4px;opacity:.5}
      td{padding:10px 14px;border-bottom:1px solid ${S.rb};max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
      tbody tr{cursor:pointer;transition:background .1s}
      tbody tr:hover td{background:${S.hov}}
      .hl{background:${S.hlb};color:${S.hlt};border-radius:3px;padding:0 2px}
      footer{padding:1rem 2rem;font-size:11px;opacity:.3;text-align:center;font-family:monospace;border-top:1px solid rgba(128,128,128,.1);margin-top:2rem}

      /* MODALS */
      .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.55);backdrop-filter:blur(4px);z-index:100;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .22s}
      .modal-bg.open{opacity:1;pointer-events:all}
      .modal-box{background:${bg};border:1px solid rgba(128,128,128,.15);border-radius:16px;width:min(520px,90vw);max-height:82vh;overflow:hidden;display:flex;flex-direction:column;transform:translateY(12px) scale(.98);transition:transform .25s cubic-bezier(.4,0,.2,1)}
      .modal-bg.open .modal-box{transform:translateY(0) scale(1)}
      .modal-head{display:flex;align-items:center;justify-content:space-between;padding:1rem 1.25rem;border-bottom:1px solid rgba(128,128,128,.12);}
      .modal-head-title{font-size:13px;font-weight:700;color:${tx}}
      .modal-close-btn{background:none;border:none;font-size:20px;cursor:pointer;color:${tx};opacity:.4;transition:opacity .15s;line-height:1;padding:0 4px}
      .modal-close-btn:hover{opacity:1}
      .modal-body{overflow-y:auto;padding:1.25rem;display:flex;flex-direction:column;gap:14px;}
      .detail-row{display:flex;flex-direction:column;gap:4px;padding-bottom:12px;border-bottom:1px solid rgba(128,128,128,.08)}
      .detail-row:last-child{border-bottom:none;padding-bottom:0}
      .detail-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;opacity:.4;font-family:monospace}
      .detail-value{font-size:14px;color:${tx};word-break:break-word;line-height:1.6}
      .add-field label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.08em;opacity:.5;font-family:monospace;margin-bottom:5px}
      .add-field input,.add-field textarea{width:100%;padding:8px 10px;border:1px solid rgba(128,128,128,.2);border-radius:8px;background:rgba(128,128,128,.06);color:${tx};font-family:inherit;font-size:13px;outline:none;transition:border-color .15s}
      .add-field input:focus,.add-field textarea:focus{border-color:${ac}}
      .modal-foot{padding:1rem 1.25rem;border-top:1px solid rgba(128,128,128,.12);display:flex;gap:8px;justify-content:space-between;align-items:center}
      .btn-cancel{padding:8px 16px;background:transparent;border:1px solid rgba(128,128,128,.2);border-radius:8px;font-family:inherit;font-size:13px;color:${tx};cursor:pointer;opacity:.6}
      .btn-cancel:hover{opacity:1}
      .btn-save{padding:8px 20px;background:${S.btnbg};color:${S.btntx};border:none;border-radius:8px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer}
      .btn-save:hover{opacity:.85}
      .bulk-toggle{font-size:12px;color:${ac};cursor:pointer;text-decoration:underline;opacity:.8}
    </style>

    <header>
      <div class="site-title">${esc(title||'My Data')}</div>
      <div class="hdr-right">
        <div class="search-wrap">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="${ac}" stroke-width="2.5" opacity=".7"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input id="search" type="text" placeholder="${esc(ph)}" oninput="applyFilters()">
        </div>
        <button class="add-btn" onclick="openAddModal()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Record
        </button>
      </div>
    </header>

    <main>
      <div class="meta" id="meta">${rows.length} rows · ${headers.length} columns · workfancy</div>
      <div class="filter-bar" id="filter-bar"></div>
      <div class="table-box">
        <div class="sc">
          <table id="tbl">
            <thead><tr id="thead-row"></tr></thead>
            <tbody id="tbody"></tbody>
          </table>
        </div>
      </div>
      <div id="empty" style="display:none;text-align:center;padding:3rem;opacity:.3;font-size:14px;">No results found</div>
    </main>
    <footer>${esc(ft)}</footer>

    <!-- Detail Modal -->
    <div class="modal-bg" id="detail-modal" onclick="if(event.target===this)closeDetailModal()">
      <div class="modal-box">
        <div class="modal-head">
          <span class="modal-head-title">Row Details</span>
          <button class="modal-close-btn" onclick="closeDetailModal()">×</button>
        </div>
        <div class="modal-body" id="detail-body"></div>
      </div>
    </div>

    <!-- Add Modal -->
    <div class="modal-bg" id="add-modal" onclick="if(event.target===this)closeAddModal()">
      <div class="modal-box">
        <div class="modal-head">
          <span class="modal-head-title">Add Record</span>
          <button class="modal-close-btn" onclick="closeAddModal()">×</button>
        </div>
        <div class="modal-body" id="add-body"></div>
        <div class="modal-foot">
          <span class="bulk-toggle" onclick="toggleBulk()" id="bulk-toggle-btn">Switch to bulk import</span>
          <div style="display:flex;gap:8px;">
            <button class="btn-cancel" onclick="closeAddModal()">Cancel</button>
            <button class="btn-save" id="save-btn" onclick="saveRecord()">Save Record</button>
          </div>
        </div>
      </div>
    </div>
  `;

  document.getElementById('app').style.display = 'block';
  document.getElementById('loading').style.display = 'none';

  buildTableHead(headers);
  renderRows();
  renderFilters(headers, rows);
  buildAddForm(headers);
}

function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function buildTableHead(headers){
  document.getElementById('thead-row').innerHTML = headers.map((h,i) =>
    `<th onclick="sortBy(${i})"><span>${esc(h)}</span><span class="sort-icon">↕</span></th>`
  ).join('');
}

function renderRows(){
  const q = (document.getElementById('search')?.value||'').toLowerCase().trim();
  let filtered = [...allRows];

  Object.entries(filterValues).forEach(([col, val]) => {
    if(val !== '') filtered = filtered.filter(r => String(r[parseInt(col)]||'') === val);
  });

  if(q) filtered = filtered.filter(r => r.some(c => String(c||'').toLowerCase().includes(q)));

  if(sortCol >= 0){
    filtered.sort((a,b) => {
      const va = String(a[sortCol]||''), vb = String(b[sortCol]||'');
      const na = parseFloat(va), nb = parseFloat(vb);
      if(!isNaN(na)&&!isNaN(nb)) return sortAsc ? na-nb : nb-na;
      return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
    });
  }

  const tbody = document.getElementById('tbody');
  const meta = document.getElementById('meta');
  const empty = document.getElementById('empty');

  empty.style.display = filtered.length ? 'none' : 'block';
  meta.textContent = filtered.length < allRows.length
    ? `${filtered.length} of ${allRows.length} rows shown`
    : `${allRows.length} rows · ${HEADERS.length} columns · workfancy`;

  // store filtered for modal reference
  window._filteredRows = filtered;

  tbody.innerHTML = filtered.map((row, ri) =>
    `<tr onclick="openDetailModal(${ri})">
      ${HEADERS.map((_,i) => `<td title="${esc(String(row[i]||''))}">${esc(String(row[i]||''))}</td>`).join('')}
    </tr>`
  ).join('');
}

function applyFilters(){ renderRows(); }

function sortBy(i){
  if(sortCol===i) sortAsc=!sortAsc; else{sortCol=i;sortAsc=true;}
  document.querySelectorAll('#thead-row th').forEach((t,j) => {
    t.classList.toggle('sorted', j===i);
    t.querySelector('.sort-icon').textContent = j===i ? (sortAsc?'↑':'↓') : '↕';
  });
  renderRows();
}

// ── Column Filters ─────────────────────────
function renderFilters(headers, rows){
  const bar = document.getElementById('filter-bar');
  if(!bar) return;
  bar.innerHTML = headers.map((h,i) => {
    const unique = [...new Set(rows.map(r => String(r[i]||'')).filter(Boolean))].sort();
    if(unique.length < 2 || unique.length > 80) return '';
    return `<select class="filter-select" onchange="setFilter(${i},this.value)">
      <option value="">All ${esc(h)}</option>
      ${unique.map(v=>`<option value="${esc(v)}">${esc(v)}</option>`).join('')}
    </select>`;
  }).join('');
}

function setFilter(col, val){ filterValues[col]=val; renderRows(); }

// ── Detail Modal ───────────────────────────
function openDetailModal(ri){
  const row = window._filteredRows[ri];
  document.getElementById('detail-body').innerHTML = HEADERS.map((h,i) =>
    `<div class="detail-row">
      <div class="detail-label">${esc(h)}</div>
      <div class="detail-value">${esc(String(row[i]||'—'))}</div>
    </div>`
  ).join('');
  document.getElementById('detail-modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeDetailModal(){
  document.getElementById('detail-modal').classList.remove('open');
  document.body.style.overflow='';
}

// ── Add Record Modal ───────────────────────
function buildAddForm(headers){
  document.getElementById('add-body').innerHTML = `
    <div id="single-form">
      ${headers.map((h,i)=>`
        <div class="add-field">
          <label>${esc(h)}</label>
          <input type="text" id="field-${i}" placeholder="Enter ${esc(h)}">
        </div>`).join('')}
    </div>
    <div id="bulk-form" style="display:none;">
      <div class="add-field">
        <label>Paste CSV (one row per line, values separated by commas)</label>
        <textarea id="bulk-input" rows="7" placeholder="${headers.join(',')}&#10;value1,value2,..."></textarea>
      </div>
    </div>`;
}

function toggleBulk(){
  bulkMode = !bulkMode;
  document.getElementById('single-form').style.display = bulkMode?'none':'flex';
  document.getElementById('bulk-form').style.display = bulkMode?'block':'none';
  document.getElementById('bulk-toggle-btn').textContent = bulkMode?'Switch to single record':'Switch to bulk import';
  document.getElementById('save-btn').textContent = bulkMode?'Import All':'Save Record';
}

function openAddModal(){
  document.getElementById('add-modal').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeAddModal(){
  document.getElementById('add-modal').classList.remove('open');
  document.body.style.overflow='';
}

async function saveRecord(){
  const btn = document.getElementById('save-btn');
  btn.textContent='Saving…'; btn.disabled=true;

  try {
    if(bulkMode){
      const lines = (document.getElementById('bulk-input').value||'').trim().split('\n').filter(l=>l.trim());
      for(const line of lines){
        const vals = line.split(',');
        const data = {};
        HEADERS.forEach((h,i)=>{ data[h]=vals[i]?.trim()||''; });
        await fetch(`${WORKER_URL}/records`,{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({site_id:SITE_ID,data}) });
        allRows.push(HEADERS.map(h=>data[h]||''));
      }
    } else {
      const data = {};
      HEADERS.forEach((h,i)=>{ data[h]=document.getElementById(`field-${i}`)?.value||''; });
      const res = await fetch(`${WORKER_URL}/records`,{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({site_id:SITE_ID,data}) });
      if(!res.ok) throw new Error('Save failed');
      allRows.push(HEADERS.map(h=>data[h]||''));
    }

    renderRows();
    renderFilters(HEADERS, allRows);
    closeAddModal();
    buildAddForm(HEADERS);
    bulkMode=false;
    document.getElementById('single-form').style.display='';
    document.getElementById('bulk-form').style.display='none';

  } catch(e){
    alert('Failed to save: '+e.message);
  } finally {
    btn.textContent=bulkMode?'Import All':'Save Record';
    btn.disabled=false;
  }
}

function showError(){
  document.getElementById('loading').style.display='none';
  document.getElementById('error').style.display='flex';
}

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){ closeDetailModal(); closeAddModal(); }
});

load();
</script>
</body>
</html>
